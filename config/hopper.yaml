env:
  name: hopper
  id: Hopper-v5
  action_type: continuous
  max_steps: 1000

expert:
  algo: sac
  save_path: models/hopper/expert
  env_seed: 42
  total_timesteps: 1000000

  params:
    policy: MlpPolicy
    learning_rate: 0.001
    buffer_size: 1000000
    learning_starts: 10000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    train_freq: 1
    gradient_steps: 1
    seed: 42

trajectory_collection:
  output_dir: data/hopper
  random_trajs_seed: 1000000

  train:
    n: 1000
    seed: 100

  valid:
    n: 100
    seed: 2000

  test:
    n: 100
    seed: 30000

policy:
  hidden: 128
  log_std_min: -5
  log_std_max: 2

reward:
  hidden: 64
  gamma: 0.99

training:
  n_outer_steps: 100
  n_inner_steps: 100000
  n_agent_traj: 1000
  n_expert_traj: 1000
  lr_outer: 1.0e-6
  lr_inner: 1.0e-4

evaluation:
  n_eval_traj: 1000
  expert_trajs_path: data/hopper/expert_eval_trajs.pt
  random_trajs_path: data/hopper/random_eval_trajs.pt
  eval_seeds_path: data/hopper/eval_seeds.json
